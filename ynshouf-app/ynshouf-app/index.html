<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a2a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ינשו״פ">
<title>ינשו״פ — דוח אירוע</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<style>
:root {
  --green-dark: #1a3a2a;
  --green-mid: #2d5a3d;
  --green-light: #3d7a52;
  --green-accent: #5ba373;
  --green-pale: #e8f2ec;
  --sand: #f5f0e8;
  --sand-dark: #e8e0d0;
  --text-dark: #1a2520;
  --text-mid: #3d5048;
  --text-light: #6b8070;
  --white: #ffffff;
  --danger: #c0392b;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: 'Heebo', sans-serif; background: var(--green-dark); color: var(--text-dark); }
#app { height: 100vh; display: flex; flex-direction: column; }
.header { background: var(--green-dark); padding: 48px 20px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header-logo { display: flex; align-items: center; gap: 10px; }
.header-icon { width: 36px; height: 36px; background: var(--green-accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.header-title { font-size: 18px; font-weight: 700; color: var(--white); }
.header-sub { font-size: 11px; color: var(--green-accent); }
.tab-bar { background: var(--green-dark); display: flex; padding: 0 16px 12px; gap: 8px; flex-shrink: 0; }
.tab { flex: 1; padding: 9px 0; border-radius: 10px; border: none; font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: rgba(255,255,255,0.5); }
.tab.active { background: var(--green-mid); color: var(--white); }
.content { flex: 1; overflow-y: auto; background: var(--sand); border-radius: 20px 20px 0 0; }
.view { display: none; padding: 20px 16px 120px; }
.view.active { display: block; }
.section-title { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; }
.section-title:first-child { margin-top: 4px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 13px; color: var(--text-mid); margin-bottom: 5px; font-weight: 500; }
.field input, .field select, .field textarea {
  width: 100%; padding: 12px 14px;
  background: var(--white); border: 1.5px solid var(--sand-dark);
  border-radius: var(--radius-sm); font-family: 'Heebo', sans-serif;
  font-size: 15px; color: var(--text-dark); outline: none;
  transition: border-color 0.2s; direction: rtl; -webkit-appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--green-accent); }
.field textarea { min-height: 90px; resize: none; line-height: 1.6; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Image Upload */
.img-upload-area { border: 2px dashed var(--sand-dark); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; background: var(--white); transition: all 0.2s; }
.img-upload-area:active { border-color: var(--green-accent); background: var(--green-pale); }
.img-upload-icon { font-size: 32px; margin-bottom: 8px; }
.img-upload-text { font-size: 14px; color: var(--text-mid); }
.img-upload-sub { font-size: 12px; color: var(--text-light); margin-top: 4px; }
.img-count { font-size: 12px; color: var(--text-light); margin-top: 8px; text-align: center; }

/* Image Card */
.img-card { background: var(--white); border-radius: 10px; padding: 12px; border: 1.5px solid var(--sand-dark); margin-bottom: 10px; }
.img-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.img-card-num { font-size: 13px; font-weight: 700; color: var(--green-mid); }
.img-card-del { background: none; border: none; color: var(--danger); font-size: 20px; cursor: pointer; padding: 0 4px; }
.img-card img { width: 100%; border-radius: 8px; max-height: 200px; object-fit: cover; margin-bottom: 8px; }
.img-card input { width: 100%; padding: 8px 10px; border: 1.5px solid var(--sand-dark); border-radius: 8px; font-family: 'Heebo', sans-serif; font-size: 13px; direction: rtl; outline: none; background: var(--sand); }
.img-card input:focus { border-color: var(--green-accent); }

/* Buttons */
.gen-btn { width: 100%; padding: 16px; margin-top: 16px; background: var(--green-dark); color: var(--white); border: none; border-radius: var(--radius); font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.gen-btn:active { opacity: 0.9; }
.gen-btn:disabled { opacity: 0.5; }

/* Result */
.result-box { margin-top: 16px; background: var(--white); border-radius: var(--radius); border: 1.5px solid var(--green-accent); overflow: hidden; display: none; }
.result-header { background: var(--green-dark); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.result-header span { font-size: 13px; font-weight: 600; color: var(--white); }
.result-actions { display: flex; gap: 6px; }
.copy-btn { background: var(--green-accent); color: var(--white); border: none; padding: 6px 12px; border-radius: 20px; font-family: 'Heebo', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; }
.edit-btn { background: rgba(255,255,255,0.15); color: var(--white); border: 1px solid rgba(255,255,255,0.3); padding: 6px 12px; border-radius: 20px; font-family: 'Heebo', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; }
.result-text { padding: 16px; font-size: 14px; line-height: 1.8; color: var(--text-dark); white-space: pre-wrap; direction: rtl; }
.result-textarea { width: 100%; padding: 16px; font-size: 14px; line-height: 1.8; color: var(--text-dark); direction: rtl; border: none; outline: none; font-family: 'Heebo', sans-serif; resize: none; min-height: 200px; background: var(--white); display: none; }

/* AI Fix Section */
.ai-fix-section { padding: 12px 16px; border-top: 1px solid var(--sand-dark); background: var(--sand); display: none; }
.ai-fix-label { font-size: 12px; color: var(--text-mid); margin-bottom: 6px; font-weight: 600; }
.ai-fix-row { display: flex; gap: 8px; }
.ai-fix-input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); font-family: 'Heebo', sans-serif; font-size: 13px; direction: rtl; outline: none; background: var(--white); }
.ai-fix-input:focus { border-color: var(--green-accent); }
.ai-fix-btn { padding: 9px 14px; background: var(--green-mid); color: var(--white); border: none; border-radius: var(--radius-sm); font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }

/* Export Section */
.export-section { margin-top: 16px; background: var(--white); border-radius: var(--radius); padding: 16px; display: none; border: 1.5px solid var(--sand-dark); }
.export-title { font-size: 13px; font-weight: 700; color: var(--text-mid); margin-bottom: 12px; }
.email-row { display: flex; gap: 8px; margin-bottom: 10px; }
.email-input { flex: 1; padding: 10px 12px; border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); font-family: 'Heebo', sans-serif; font-size: 14px; direction: ltr; outline: none; }
.email-input:focus { border-color: var(--green-accent); }
.send-btn { padding: 10px 16px; background: var(--green-mid); color: var(--white); border: none; border-radius: var(--radius-sm); font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.download-btn { width: 100%; padding: 13px; background: var(--green-pale); color: var(--green-dark); border: 1.5px solid var(--green-accent); border-radius: var(--radius); font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }

/* Loading */
.loading-bar { height: 3px; background: var(--green-pale); border-radius: 2px; overflow: hidden; margin: 12px 0; display: none; }
.loading-bar-inner { height: 100%; background: var(--green-accent); border-radius: 2px; animation: loading 1.5s ease-in-out infinite; }
@keyframes loading { 0%,100%{width:20%;margin-right:0} 50%{width:60%;margin-right:20%} }

/* Toast */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--green-dark); color: var(--white); padding: 12px 20px; border-radius: 20px; font-size: 14px; font-weight: 500; display: none; z-index: 999; white-space: nowrap; }
.toast.show { display: block; }

/* History */
.history-empty { text-align: center; padding: 60px 20px; color: var(--text-light); font-size: 15px; }
.history-item { background: var(--white); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; border: 1.5px solid transparent; }
.history-item:active { border-color: var(--green-accent); }
.history-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.history-type { font-size: 12px; font-weight: 700; color: var(--green-mid); background: var(--green-pale); padding: 3px 10px; border-radius: 20px; }
.history-date { font-size: 11px; color: var(--text-light); }
.history-location { font-size: 13px; color: var(--text-mid); margin-bottom: 4px; }
.history-preview { font-size: 12px; color: var(--text-light); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.history-delete { background: none; border: none; color: var(--danger); font-size: 18px; cursor: pointer; padding: 4px 8px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--white); border-radius: 20px 20px 0 0; width: 100%; max-height: 80vh; overflow-y: auto; padding: 20px 16px 40px; }
.modal-handle { width: 40px; height: 4px; background: var(--sand-dark); border-radius: 2px; margin: 0 auto 16px; }
.modal-type { font-size: 12px; font-weight: 700; color: var(--green-mid); background: var(--green-pale); padding: 3px 10px; border-radius: 20px; display: inline-block; margin-bottom: 8px; }
.modal-date { font-size: 12px; color: var(--text-light); margin-bottom: 12px; }
.modal-text { font-size: 14px; line-height: 1.9; color: var(--text-dark); white-space: pre-wrap; direction: rtl; }
.modal-close { width: 100%; padding: 13px; margin-top: 20px; background: var(--green-dark); color: var(--white); border: none; border-radius: var(--radius); font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
.modal-copy { width: 100%; padding: 13px; margin-top: 10px; background: var(--green-pale); color: var(--green-dark); border: 1.5px solid var(--green-accent); border-radius: var(--radius); font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-logo">
      <div class="header-icon">🦅</div>
      <div>
        <div class="header-title">ינשו״פ</div>
        <div class="header-sub">יחידה נגד שריפות והשלכות פסולת</div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('form')">דוח חדש</button>
    <button class="tab" onclick="switchTab('history')">היסטוריה</button>
  </div>

  <div class="content">
    <div class="view active" id="view-form">
      <div class="section-title">פרטי האירוע</div>
      <div class="field-row">
        <div class="field">
          <label>תאריך</label>
          <input type="date" id="date">
        </div>
        <div class="field">
          <label>שעה</label>
          <input type="time" id="time">
        </div>
      </div>
      <div class="field">
        <label>סוג האירוע</label>
        <select id="event_type">
          <option value="">-- בחר סוג --</option>
          <option>השלכת פסולת בניין</option>
          <option>השלכת פסולת מעורבת</option>
          <option>שריפת פסולת</option>
          <option>שריפת קוצים</option>
          <option>שריפת פסולת חקלאית</option>
          <option>אחר</option>
        </select>
      </div>
      <div class="field">
        <label>מיקום / אזור</label>
        <input type="text" id="location" placeholder="לדוגמה: בין אופקים לבסיס חצרים">
      </div>

      <div class="section-title">פרטי מבצע / רכב</div>
      <div class="field">
        <label>לוחית רישוי</label>
        <input type="text" id="plate" placeholder="לדוגמה: 304-20-203">
      </div>
      <div class="field">
        <label>סוג רכב</label>
        <input type="text" id="vehicle" placeholder="לדוגמה: משאית וולבו לבנה">
      </div>
      <div class="field">
        <label>בעלים / מבצע</label>
        <input type="text" id="owner" placeholder="שם ופרטים אם ידועים">
      </div>

      <div class="section-title">תיעוד ותיאור</div>
      <div class="field">
        <label>תיעוד שנאסף</label>
        <select id="documentation">
          <option>מצלמת שביל (וידאו + סטילס)</option>
          <option>מצלמת שביל (סטילס בלבד)</option>
          <option>צילום ידני בשטח</option>
          <option>מצלמת שביל + צילום ידני</option>
          <option>ללא תיעוד</option>
        </select>
      </div>
      <div class="field">
        <label>תיאור מה קרה (במילים שלך)</label>
        <textarea id="description" placeholder="תאר מה ראית בשטח..."></textarea>
      </div>
      <div class="field">
        <label>הערות נוספות</label>
        <input type="text" id="notes" placeholder="מקרים קודמים, תיאומים וכו׳">
      </div>

      <div class="section-title">תמונות מהשטח</div>
      <div class="img-upload-area" onclick="document.getElementById('imgInput').click()">
        <div class="img-upload-icon">📸</div>
        <div class="img-upload-text">הוסף תמונות מהגלריה</div>
        <div class="img-upload-sub">ניתן לבחור מספר תמונות</div>
      </div>
      <input type="file" id="imgInput" accept="image/*" multiple style="display:none" onchange="handleImages(this)">
      <div id="imgGrid" style="margin-top:12px"></div>
      <div class="img-count" id="imgCount"></div>

      <button class="gen-btn" id="genBtn" onclick="generateReport()">
        <span>✍️</span> כתיבת מהות האירוע
      </button>

      <div class="loading-bar" id="loadingBar">
        <div class="loading-bar-inner"></div>
      </div>

      <!-- Result Box -->
      <div class="result-box" id="resultBox">
        <div class="result-header">
          <span>מהות האירוע</span>
          <div class="result-actions">
            <button class="edit-btn" onclick="toggleEdit()">✏️ עריכה ידנית</button>
            <button class="copy-btn" onclick="copyResult()">העתק</button>
          </div>
        </div>
        <div class="result-text" id="resultText"></div>
        <textarea class="result-textarea" id="resultTextarea" onchange="syncText(this.value)"></textarea>

        <!-- AI Fix Section -->
        <div class="ai-fix-section" id="aiFix">
          <div class="ai-fix-label">🤖 תיקון בעזרת AI — כתוב מה לשנות:</div>
          <div class="ai-fix-row">
            <input type="text" class="ai-fix-input" id="fixInput" placeholder="לדוגמה: שנה את השעה ל-14:30, הוסף שהמשאית הייתה ירוקה...">
            <button class="ai-fix-btn" onclick="fixWithAI()">תקן ✨</button>
          </div>
        </div>
      </div>

      <!-- Show/Hide AI Fix Button -->
      <button id="showFixBtn" onclick="toggleAIFix()" style="display:none;width:100%;margin-top:8px;padding:11px;background:var(--green-pale);color:var(--green-mid);border:1.5px solid var(--green-accent);border-radius:var(--radius);font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">
        🤖 תיקון בעזרת AI
      </button>

      <!-- Export Section -->
      <div class="export-section" id="exportSection">
        <div class="export-title">📄 ייצוא דוח Word</div>
        <div class="email-row">
          <input type="email" class="email-input" id="emailInput" placeholder="כתובת מייל לשליחה" dir="ltr">
          <button class="send-btn" onclick="sendByEmail()">שלח 📧</button>
        </div>
        <button class="download-btn" onclick="downloadWord()">⬇️ הורד קובץ Word לטלפון</button>
      </div>

      <div style="margin-top:10px;display:none" id="saveSection">
        <button style="width:100%;padding:13px;background:var(--green-pale);color:var(--green-dark);border:1.5px solid var(--green-accent);border-radius:var(--radius);font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;cursor:pointer;" onclick="saveReport()">💾 שמור לארכיון</button>
      </div>
    </div>

    <div class="view" id="view-history">
      <div class="section-title">אירועים שמורים</div>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-type" id="modalType"></div>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-text" id="modalText"></div>
    <button class="modal-copy" onclick="copyModal()">העתק טקסט</button>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">סגור</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PROXY = 'https://ynshouf-proxy.fonzoahrak.workers.dev';
let uploadedImages = [];
let isEditMode = false;
let isAIFixVisible = false;

document.getElementById('date').value = new Date().toISOString().split('T')[0];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='form')||(i===1&&tab==='history')));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  if (tab === 'history') renderHistory();
}

// Image handling
function handleImages(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      uploadedImages.push({ src: e.target.result, name: file.name, desc: '' });
      renderImages();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderImages() {
  const grid = document.getElementById('imgGrid');
  const count = document.getElementById('imgCount');
  grid.innerHTML = uploadedImages.map((img, i) => {
    const num = String(i + 1).padStart(2, '0');
    return `
      <div class="img-card">
        <div class="img-card-header">
          <span class="img-card-num">תמונה מספר ${num}</span>
          <button class="img-card-del" onclick="removeImage(${i})">×</button>
        </div>
        <img src="${img.src}" alt="תמונה ${num}">
        <input type="text" value="${img.desc||''}" onchange="uploadedImages[${i}].desc=this.value" placeholder="תיאור מה רואים בתמונה...">
      </div>
    `;
  }).join('');
  count.textContent = uploadedImages.length > 0 ? `${uploadedImages.length} תמונות` : '';
}

function removeImage(i) {
  uploadedImages.splice(i, 1);
  renderImages();
}

// Generate report
async function generateReport() {
  const eventType = document.getElementById('event_type').value;
  const location = document.getElementById('location').value;
  const description = document.getElementById('description').value;
  if (!eventType || !location || !description) { alert('יש למלא: סוג אירוע, מיקום ותיאור'); return; }

  const date = document.getElementById('date').value;
  const time = document.getElementById('time').value;
  const plate = document.getElementById('plate').value;
  const vehicle = document.getElementById('vehicle').value;
  const owner = document.getElementById('owner').value;
  const documentation = document.getElementById('documentation').value;
  const notes = document.getElementById('notes').value;
  const dateFormatted = date ? new Date(date).toLocaleDateString('he-IL') : '';

  const prompt = `אתה פקח סביבתי ינשו"פ של רשות הטבע והגנים. כתוב סעיף "מהות האירוע" לדוח אכיפה רשמי בעברית.
סגנון: רשמי, עובדתי, ענייני. גוף ראשון יחיד. פסקאות קצרות. בלי כותרות פנימיות. התחל ב"במסגרת פעילות אכיפה שוטפת...".
פרטים: תאריך: ${dateFormatted}, שעה: ${time||'לא ידועה'}, סוג: ${eventType}, מיקום: ${location}, לוחית: ${plate||'לא ידועה'}, רכב: ${vehicle||'לא ידוע'}, בעלים: ${owner||'לא ידוע'}, תיעוד: ${documentation}, תיאור: ${description}, הערות: ${notes||'אין'}.
כתוב רק גוף הטקסט, ללא כותרת.`;

  await callAI(prompt, true);
}

async function callAI(prompt, isNew) {
  const btn = document.getElementById('genBtn');
  if (isNew) btn.disabled = true;
  document.getElementById('loadingBar').style.display = 'block';
  if (isNew) {
    document.getElementById('resultBox').style.display = 'none';
    document.getElementById('exportSection').style.display = 'none';
    document.getElementById('saveSection').style.display = 'none';
    document.getElementById('showFixBtn').style.display = 'none';
  }

  try {
    const response = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await response.json();
    const text = data.text || 'שגיאה';
    setResultText(text);
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('exportSection').style.display = 'block';
    document.getElementById('saveSection').style.display = 'block';
    document.getElementById('showFixBtn').style.display = 'block';
    if (isNew) document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
    showToast('הדוח עודכן ✓');
  } catch(e) {
    alert('שגיאה בחיבור. בדוק אינטרנט.');
  }

  if (isNew) btn.disabled = false;
  document.getElementById('loadingBar').style.display = 'none';
}

function setResultText(text) {
  document.getElementById('resultText').textContent = text;
  document.getElementById('resultTextarea').value = text;
}

function getResultText() {
  if (isEditMode) return document.getElementById('resultTextarea').value;
  return document.getElementById('resultText').textContent;
}

function syncText(val) {
  document.getElementById('resultText').textContent = val;
}

// Toggle manual edit mode
function toggleEdit() {
  isEditMode = !isEditMode;
  const text = document.getElementById('resultText');
  const textarea = document.getElementById('resultTextarea');
  const btn = document.querySelector('.edit-btn');

  if (isEditMode) {
    textarea.value = text.textContent;
    text.style.display = 'none';
    textarea.style.display = 'block';
    textarea.style.height = textarea.scrollHeight + 'px';
    btn.textContent = '✅ סיים עריכה';
    btn.style.background = 'rgba(91,163,115,0.3)';
  } else {
    text.textContent = textarea.value;
    text.style.display = 'block';
    textarea.style.display = 'none';
    btn.textContent = '✏️ עריכה ידנית';
    btn.style.background = '';
  }
}

// Toggle AI fix section
function toggleAIFix() {
  isAIFixVisible = !isAIFixVisible;
  const section = document.getElementById('aiFix');
  const btn = document.getElementById('showFixBtn');
  section.style.display = isAIFixVisible ? 'block' : 'none';
  btn.textContent = isAIFixVisible ? '✖ סגור תיקון AI' : '🤖 תיקון בעזרת AI';
}

// Fix with AI
async function fixWithAI() {
  const fixNote = document.getElementById('fixInput').value.trim();
  if (!fixNote) { alert('יש לכתוב מה לשנות'); return; }

  const currentText = getResultText();
  const prompt = `להלן דוח אכיפה סביבתי רשמי בעברית:

${currentText}

אנא תקן את הדוח לפי ההוראות הבאות: ${fixNote}

חשוב: שמור על אותו סגנון רשמי ועובדתי. החזר רק את הטקסט המתוקן ללא כותרות או הסברים.`;

  const fixBtn = document.querySelector('.ai-fix-btn');
  fixBtn.textContent = '⏳';
  fixBtn.disabled = true;

  await callAI(prompt, false);

  fixBtn.textContent = 'תקן ✨';
  fixBtn.disabled = false;
  document.getElementById('fixInput').value = '';
}

function copyResult() {
  navigator.clipboard.writeText(getResultText());
  showToast('הטקסט הועתק ✓');
}

// Word document generation
async function buildWordDoc() {
  const { Document, Paragraph, TextRun, ImageRun, AlignmentType, Packer } = docx;

  const date = document.getElementById('date').value;
  const eventType = document.getElementById('event_type').value;
  const location = document.getElementById('location').value;
  const plate = document.getElementById('plate').value;
  const vehicle = document.getElementById('vehicle').value;
  const owner = document.getElementById('owner').value;
  const reportText = getResultText();
  const dateFormatted = date ? new Date(date).toLocaleDateString('he-IL') : '';

  const children = [];

  children.push(new Paragraph({ children: [new TextRun({ text: 'הרשות לשמירת הטבע והגנים הלאומיים', bold: true, size: 28, rightToLeft: true })], alignment: AlignmentType.CENTER }));
  children.push(new Paragraph({ children: [new TextRun({ text: 'ינשו״פ — יחידה נגד שריפות והשלכות פסולת', size: 22, rightToLeft: true })], alignment: AlignmentType.CENTER }));
  children.push(new Paragraph({ text: '' }));
  children.push(new Paragraph({ children: [new TextRun({ text: 'דוח פעולה', bold: true, size: 28, rightToLeft: true })], alignment: AlignmentType.CENTER }));
  children.push(new Paragraph({ text: '' }));

  const details = [['תאריך', dateFormatted], ['סוג אירוע', eventType], ['מיקום', location], ['לוחית רישוי', plate||'לא ידועה'], ['סוג רכב', vehicle||'לא ידוע'], ['בעלים/מבצע', owner||'לא ידוע']];
  details.forEach(([label, value]) => {
    children.push(new Paragraph({ children: [new TextRun({ text: `${label}: `, bold: true, rightToLeft: true }), new TextRun({ text: value, rightToLeft: true })], alignment: AlignmentType.RIGHT }));
  });

  children.push(new Paragraph({ text: '' }));
  children.push(new Paragraph({ children: [new TextRun({ text: 'מהות האירוע', bold: true, size: 26, rightToLeft: true })], alignment: AlignmentType.RIGHT }));
  children.push(new Paragraph({ text: '' }));

  reportText.split('\n').forEach(line => {
    if (line.trim()) children.push(new Paragraph({ children: [new TextRun({ text: line, rightToLeft: true, size: 22 })], alignment: AlignmentType.RIGHT }));
  });

  if (uploadedImages.length > 0) {
    children.push(new Paragraph({ text: '' }));
    children.push(new Paragraph({ children: [new TextRun({ text: 'תמונות מהשטח', bold: true, size: 26, rightToLeft: true })], alignment: AlignmentType.RIGHT }));

    for (let i = 0; i < uploadedImages.length; i++) {
      const img = uploadedImages[i];
      const num = String(i + 1).padStart(2, '0');
      try {
        const base64 = img.src.split(',')[1];
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let j = 0; j < binary.length; j++) bytes[j] = binary.charCodeAt(j);

        children.push(new Paragraph({ text: '' }));
        children.push(new Paragraph({
          children: [new TextRun({ text: `תמונה מספר ${num} : ${img.desc || ''}`, bold: true, rightToLeft: true, size: 22 })],
          alignment: AlignmentType.RIGHT,
        }));
        children.push(new Paragraph({
          children: [new ImageRun({ data: bytes, transformation: { width: 400, height: 300 }, type: 'jpg' })],
          alignment: AlignmentType.CENTER,
        }));
      } catch(e) { console.error('Image error', e); }
    }
  }

  const doc = new Document({ sections: [{ properties: {}, children }] });
  return await Packer.toBlob(doc);
}

async function downloadWord() {
  const btn = document.querySelector('.download-btn');
  btn.textContent = '⏳ מכין קובץ...';
  btn.disabled = true;
  try {
    const blob = await buildWordDoc();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `דוח_אכיפה_${new Date().toLocaleDateString('he-IL').replace(/\./g,'-')}.docx`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('הקובץ הורד בהצלחה ✓');
  } catch(e) { alert('שגיאה ביצירת הקובץ'); }
  btn.textContent = '⬇️ הורד קובץ Word לטלפון';
  btn.disabled = false;
}

async function sendByEmail() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email) { alert('יש להכניס כתובת מייל'); return; }
  const btn = document.querySelector('.send-btn');
  btn.textContent = '⏳';
  btn.disabled = true;
  try {
    const blob = await buildWordDoc();
    const reader = new FileReader();
    reader.onload = async () => {
      const base64 = reader.result.split(',')[1];
      const eventType = document.getElementById('event_type').value;
      const date = document.getElementById('date').value;
      const dateFormatted = date ? new Date(date).toLocaleDateString('he-IL') : '';
      const response = await fetch(PROXY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'send_email', to: email, subject: `דוח אכיפה — ${eventType} — ${dateFormatted}`, body: getResultText(), attachment: base64, filename: `דוח_אכיפה_${dateFormatted}.docx` })
      });
      const data = await response.json();
      showToast(data.success ? `המייל נשלח ל-${email} ✓` : 'שגיאה בשליחת המייל');
    };
    reader.readAsDataURL(blob);
  } catch(e) { alert('שגיאה. נסה שוב.'); }
  btn.textContent = 'שלח 📧';
  btn.disabled = false;
}

function saveReport() {
  const report = { id: Date.now(), date: document.getElementById('date').value, type: document.getElementById('event_type').value, location: document.getElementById('location').value, text: getResultText(), savedAt: new Date().toISOString() };
  const history = JSON.parse(localStorage.getItem('reports') || '[]');
  history.unshift(report);
  localStorage.setItem('reports', JSON.stringify(history));
  showToast('נשמר לארכיון ✓');
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem('reports') || '[]');
  const list = document.getElementById('historyList');
  if (!history.length) { list.innerHTML = '<div class="history-empty">אין אירועים שמורים עדיין</div>'; return; }
  list.innerHTML = history.map(r => `
    <div class="history-item" onclick="openModal(${r.id})">
      <div class="history-item-header">
        <span class="history-type">${r.type}</span>
        <div style="display:flex;align-items:center;gap:4px">
          <span class="history-date">${new Date(r.date).toLocaleDateString('he-IL')}</span>
          <button class="history-delete" onclick="deleteReport(event,${r.id})">×</button>
        </div>
      </div>
      <div class="history-location">📍 ${r.location}</div>
      <div class="history-preview">${r.text}</div>
    </div>
  `).join('');
}

function openModal(id) {
  const history = JSON.parse(localStorage.getItem('reports') || '[]');
  const r = history.find(x => x.id === id);
  if (!r) return;
  document.getElementById('modalType').textContent = r.type;
  document.getElementById('modalDate').textContent = `${new Date(r.date).toLocaleDateString('he-IL')} — ${r.location}`;
  document.getElementById('modalText').textContent = r.text;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open'); }

function copyModal() {
  navigator.clipboard.writeText(document.getElementById('modalText').textContent);
  showToast('הועתק ✓');
}

function deleteReport(e, id) {
  e.stopPropagation();
  if (!confirm('למחוק את הדוח?')) return;
  const history = JSON.parse(localStorage.getItem('reports') || '[]').filter(r => r.id !== id);
  localStorage.setItem('reports', JSON.stringify(history));
  renderHistory();
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
