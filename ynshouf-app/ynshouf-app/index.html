<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ינשו״פ">
<title>ינשו״פ — דוח אירוע</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --green-dark: #1a3a2a;
  --green-mid: #2d5a3d;
  --green-light: #3d7a52;
  --green-accent: #5ba373;
  --green-pale: #e8f2ec;
  --sand: #f5f0e8;
  --sand-dark: #e8e0d0;
  --text-dark: #1a2520;
  --text-mid: #3d5048;
  --text-light: #6b8070;
  --white: #ffffff;
  --danger: #c0392b;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: 'Heebo', sans-serif; background: var(--green-dark); color: var(--text-dark); }

/* App Shell */
#app { height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header {
  background: var(--green-dark);
  padding: 52px 20px 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.header-logo { display: flex; align-items: center; gap: 10px; }
.header-icon { width: 36px; height: 36px; background: var(--green-accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.header-title { font-size: 18px; font-weight: 700; color: var(--white); letter-spacing: -0.3px; }
.header-sub { font-size: 11px; color: var(--green-accent); font-weight: 400; }

/* Tab Bar */
.tab-bar {
  background: var(--green-dark);
  display: flex;
  padding: 0 16px 12px;
  gap: 8px;
  flex-shrink: 0;
}
.tab {
  flex: 1; padding: 9px 0; border-radius: 10px; border: none;
  font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  background: transparent; color: rgba(255,255,255,0.5);
}
.tab.active { background: var(--green-mid); color: var(--white); }

/* Content Area */
.content { flex: 1; overflow-y: auto; background: var(--sand); border-radius: 20px 20px 0 0; }

/* Views */
.view { display: none; padding: 20px 16px 100px; }
.view.active { display: block; }

/* Form Styles */
.section-title { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; }
.section-title:first-child { margin-top: 4px; }

.field { margin-bottom: 12px; }
.field label { display: block; font-size: 13px; color: var(--text-mid); margin-bottom: 5px; font-weight: 500; }
.field input, .field select, .field textarea {
  width: 100%; padding: 12px 14px;
  background: var(--white); border: 1.5px solid var(--sand-dark);
  border-radius: var(--radius-sm); font-family: 'Heebo', sans-serif;
  font-size: 15px; color: var(--text-dark); outline: none;
  transition: border-color 0.2s; direction: rtl; -webkit-appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--green-accent); }
.field textarea { min-height: 90px; resize: none; line-height: 1.6; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Generate Button */
.gen-btn {
  width: 100%; padding: 16px; margin-top: 16px;
  background: var(--green-dark); color: var(--white);
  border: none; border-radius: var(--radius); font-family: 'Heebo', sans-serif;
  font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.gen-btn:active { transform: scale(0.98); opacity: 0.9; }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Result Box */
.result-box {
  margin-top: 16px; background: var(--white); border-radius: var(--radius);
  border: 1.5px solid var(--green-accent); overflow: hidden; display: none;
}
.result-header {
  background: var(--green-dark); padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.result-header span { font-size: 13px; font-weight: 600; color: var(--white); }
.copy-btn {
  background: var(--green-accent); color: var(--white); border: none;
  padding: 6px 14px; border-radius: 20px; font-family: 'Heebo', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer;
}
.result-text { padding: 16px; font-size: 14px; line-height: 1.8; color: var(--text-dark); white-space: pre-wrap; direction: rtl; }

/* Save Button */
.save-btn {
  width: 100%; padding: 13px; margin-top: 10px;
  background: var(--green-pale); color: var(--green-dark);
  border: 1.5px solid var(--green-accent); border-radius: var(--radius);
  font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; display: none;
}

/* Loading */
.loading-bar {
  height: 3px; background: var(--green-pale);
  border-radius: 2px; overflow: hidden; margin: 12px 0; display: none;
}
.loading-bar-inner {
  height: 100%; background: var(--green-accent);
  border-radius: 2px; animation: loading 1.5s ease-in-out infinite;
}
@keyframes loading { 0%,100%{width:20%;margin-right:0} 50%{width:60%;margin-right:20%} }

/* History */
.history-empty { text-align: center; padding: 60px 20px; color: var(--text-light); font-size: 15px; }
.history-item {
  background: var(--white); border-radius: var(--radius); padding: 14px 16px;
  margin-bottom: 10px; cursor: pointer; transition: all 0.15s;
  border: 1.5px solid transparent;
}
.history-item:active { border-color: var(--green-accent); }
.history-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.history-type { font-size: 12px; font-weight: 700; color: var(--green-mid); background: var(--green-pale); padding: 3px 10px; border-radius: 20px; }
.history-date { font-size: 11px; color: var(--text-light); }
.history-location { font-size: 13px; color: var(--text-mid); margin-bottom: 4px; }
.history-preview { font-size: 12px; color: var(--text-light); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.history-delete { background: none; border: none; color: var(--danger); font-size: 18px; cursor: pointer; padding: 4px 8px; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: 20px 20px 0 0;
  width: 100%; max-height: 80vh; overflow-y: auto; padding: 20px 16px 40px;
}
.modal-handle { width: 40px; height: 4px; background: var(--sand-dark); border-radius: 2px; margin: 0 auto 16px; }
.modal-type { font-size: 12px; font-weight: 700; color: var(--green-mid); background: var(--green-pale); padding: 3px 10px; border-radius: 20px; display: inline-block; margin-bottom: 8px; }
.modal-date { font-size: 12px; color: var(--text-light); margin-bottom: 12px; }
.modal-text { font-size: 14px; line-height: 1.9; color: var(--text-dark); white-space: pre-wrap; direction: rtl; }
.modal-close { width: 100%; padding: 13px; margin-top: 20px; background: var(--green-dark); color: var(--white); border: none; border-radius: var(--radius); font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
.modal-copy { width: 100%; padding: 13px; margin-top: 10px; background: var(--green-pale); color: var(--green-dark); border: 1.5px solid var(--green-accent); border-radius: var(--radius); font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-logo">
      <div class="header-icon">🦅</div>
      <div>
        <div class="header-title">ינשו״פ</div>
        <div class="header-sub">יחידה נגד שריפות והשלכות פסולת</div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('form')">דוח חדש</button>
    <button class="tab" onclick="switchTab('history')">היסטוריה</button>
  </div>

  <div class="content">
    <!-- FORM VIEW -->
    <div class="view active" id="view-form">
      <div class="section-title">פרטי האירוע</div>

      <div class="field-row">
        <div class="field">
          <label>תאריך</label>
          <input type="date" id="date">
        </div>
        <div class="field">
          <label>שעה</label>
          <input type="time" id="time">
        </div>
      </div>

      <div class="field">
        <label>סוג האירוע</label>
        <select id="event_type">
          <option value="">-- בחר סוג --</option>
          <option>השלכת פסולת בניין</option>
          <option>השלכת פסולת מעורבת</option>
          <option>שריפת פסולת</option>
          <option>שריפת קוצים</option>
          <option>שריפת פסולת חקלאית</option>
          <option>אחר</option>
        </select>
      </div>

      <div class="field">
        <label>מיקום / אזור</label>
        <input type="text" id="location" placeholder="לדוגמה: בין אופקים לבסיס חצרים">
      </div>

      <div class="section-title">פרטי מבצע / רכב</div>

      <div class="field">
        <label>לוחית רישוי</label>
        <input type="text" id="plate" placeholder="לדוגמה: 304-20-203">
      </div>

      <div class="field">
        <label>סוג רכב</label>
        <input type="text" id="vehicle" placeholder="לדוגמה: משאית וולבו לבנה">
      </div>

      <div class="field">
        <label>בעלים / מבצע</label>
        <input type="text" id="owner" placeholder="שם ופרטים אם ידועים">
      </div>

      <div class="section-title">תיעוד ותיאור</div>

      <div class="field">
        <label>תיעוד שנאסף</label>
        <select id="documentation">
          <option>מצלמת שביל (וידאו + סטילס)</option>
          <option>מצלמת שביל (סטילס בלבד)</option>
          <option>צילום ידני בשטח</option>
          <option>מצלמת שביל + צילום ידני</option>
          <option>ללא תיעוד</option>
        </select>
      </div>

      <div class="field">
        <label>תיאור מה קרה (במילים שלך)</label>
        <textarea id="description" placeholder="תאר מה ראית בשטח. ה-AI יכתוב את הדוח הרשמי..."></textarea>
      </div>

      <div class="field">
        <label>הערות נוספות</label>
        <input type="text" id="notes" placeholder="מקרים קודמים, תיאומים וכו׳">
      </div>

      <button class="gen-btn" id="genBtn" onclick="generateReport()">
        <span>✍️</span> כתיבת מהות האירוע
      </button>

      <div class="loading-bar" id="loadingBar">
        <div class="loading-bar-inner"></div>
      </div>

      <div class="result-box" id="resultBox">
        <div class="result-header">
          <span>מהות האירוע</span>
          <button class="copy-btn" onclick="copyResult()">העתק</button>
        </div>
        <div class="result-text" id="resultText"></div>
      </div>

      <button class="save-btn" id="saveBtn" onclick="saveReport()">💾 שמור לארכיון</button>
    </div>

    <!-- HISTORY VIEW -->
    <div class="view" id="view-history">
      <div class="section-title">אירועים שמורים</div>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-type" id="modalType"></div>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-text" id="modalText"></div>
    <button class="modal-copy" onclick="copyModal()">העתק טקסט</button>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">סגור</button>
  </div>
</div>

<script>
const today = new Date().toISOString().split('T')[0];
document.getElementById('date').value = today;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='form') || (i===1 && tab==='history')));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  if (tab === 'history') renderHistory();
}

async function generateReport() {
  const eventType = document.getElementById('event_type').value;
  const location = document.getElementById('location').value;
  const description = document.getElementById('description').value;
  if (!eventType || !location || !description) { alert('יש למלא: סוג אירוע, מיקום ותיאור'); return; }

  const date = document.getElementById('date').value;
  const time = document.getElementById('time').value;
  const plate = document.getElementById('plate').value;
  const vehicle = document.getElementById('vehicle').value;
  const owner = document.getElementById('owner').value;
  const documentation = document.getElementById('documentation').value;
  const notes = document.getElementById('notes').value;
  const dateFormatted = date ? new Date(date).toLocaleDateString('he-IL') : '';

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  document.getElementById('loadingBar').style.display = 'block';
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('saveBtn').style.display = 'none';

  const prompt = `אתה פקח סביבתי ינשו"פ של רשות הטבע והגנים. כתוב סעיף "מהות האירוע" לדוח אכיפה רשמי בעברית.
סגנון: רשמי, עובדתי, ענייני. גוף ראשון יחיד. פסקאות קצרות. בלי כותרות פנימיות. התחל ב"במסגרת פעילות אכיפה שוטפת...".
פרטים: תאריך: ${dateFormatted}, שעה: ${time||'לא ידועה'}, סוג: ${eventType}, מיקום: ${location}, לוחית: ${plate||'לא ידועה'}, רכב: ${vehicle||'לא ידוע'}, בעלים: ${owner||'לא ידוע'}, תיעוד: ${documentation}, תיאור: ${description}, הערות: ${notes||'אין'}.
כתוב רק גוף הטקסט, ללא כותרת.`;

  const GEMINI_KEY = 'AIzaSyA3qkGrUg1pbmgfeivPc34k2HyhiMd8glk';

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await response.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || 'שגיאה';
    document.getElementById('resultText').textContent = text;
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('saveBtn').style.display = 'block';
    document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
  } catch(e) {
    alert('שגיאה בחיבור. בדוק אינטרנט.');
  }

  btn.disabled = false;
  document.getElementById('loadingBar').style.display = 'none';
}

function copyResult() {
  navigator.clipboard.writeText(document.getElementById('resultText').textContent);
  document.querySelector('.copy-btn').textContent = 'הועתק ✓';
  setTimeout(() => document.querySelector('.copy-btn').textContent = 'העתק', 2000);
}

function saveReport() {
  const report = {
    id: Date.now(),
    date: document.getElementById('date').value,
    time: document.getElementById('time').value,
    type: document.getElementById('event_type').value,
    location: document.getElementById('location').value,
    text: document.getElementById('resultText').textContent,
    savedAt: new Date().toISOString()
  };
  const history = JSON.parse(localStorage.getItem('reports') || '[]');
  history.unshift(report);
  localStorage.setItem('reports', JSON.stringify(history));
  document.getElementById('saveBtn').textContent = '✓ נשמר!';
  setTimeout(() => { document.getElementById('saveBtn').textContent = '💾 שמור לארכיון'; }, 2000);
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem('reports') || '[]');
  const list = document.getElementById('historyList');
  if (!history.length) { list.innerHTML = '<div class="history-empty">אין אירועים שמורים עדיין</div>'; return; }
  list.innerHTML = history.map(r => `
    <div class="history-item" onclick="openModal(${r.id})">
      <div class="history-item-header">
        <span class="history-type">${r.type}</span>
        <div style="display:flex;align-items:center;gap:4px">
          <span class="history-date">${new Date(r.date).toLocaleDateString('he-IL')}</span>
          <button class="history-delete" onclick="deleteReport(event,${r.id})">×</button>
        </div>
      </div>
      <div class="history-location">📍 ${r.location}</div>
      <div class="history-preview">${r.text}</div>
    </div>
  `).join('');
}

function openModal(id) {
  const history = JSON.parse(localStorage.getItem('reports') || '[]');
  const r = history.find(x => x.id === id);
  if (!r) return;
  document.getElementById('modalType').textContent = r.type;
  document.getElementById('modalDate').textContent = `${new Date(r.date).toLocaleDateString('he-IL')} — ${r.location}`;
  document.getElementById('modalText').textContent = r.text;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open'); }

function copyModal() {
  navigator.clipboard.writeText(document.getElementById('modalText').textContent);
  document.querySelector('.modal-copy').textContent = 'הועתק ✓';
  setTimeout(() => document.querySelector('.modal-copy').textContent = 'העתק טקסט', 2000);
}

function deleteReport(e, id) {
  e.stopPropagation();
  if (!confirm('למחוק את הדוח?')) return;
  const history = JSON.parse(localStorage.getItem('reports') || '[]').filter(r => r.id !== id);
  localStorage.setItem('reports', JSON.stringify(history));
  renderHistory();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
