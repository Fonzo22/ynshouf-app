<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1f17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="cross-origin-opener-policy" content="same-origin-allow-popups">
<title>ינשו"פ — דוח אירוע</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="./docx.min.js"></script>
<script src="https://unpkg.com/proj4@2.9.0/dist/proj4.js"></script>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>
<div id="authScreen">
  <div class="auth-box">
    <img src="icon-512.png" alt="ינשוף" class="auth-logo">
    <div class="auth-title">ינשו"פ</div>
    <div class="auth-sub">יחידת אכיפת טבע וסביבה</div>
    <div class="auth-divider"></div>
    <div id="g_id_signin"></div>
    <div id="authError" class="auth-error"></div>
  </div>
</div>
<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="hdr-owl-wrap">
        <img class="hdr-owl" id="owlImg" alt="ינשוף" src="icon-512.png">
      </div>
      <div>
        <div class="hdr-name">ינשו<span>"</span>פ</div>
        <div class="hdr-sub">יחידת אכיפת טבע וסביבה</div>
      </div>
    </div>
    <div class="hdr-nav">
      <button class="nav-btn active" id="btnPageForm" onclick="showPage('form')">דוח חדש</button>
      <button class="nav-btn" id="btnPageHist" onclick="showPage('hist')">היסטוריה</button>
      <button class="nav-btn danger" onclick="clearForm()">נקה</button>
      <button class="nav-btn" id="btnLogout" onclick="signOut()">יציאה</button>
    </div>
  </div>
  <div class="hdr-prog"><div class="hdr-prog-fill" id="progFill"></div></div>
</header>

<div class="page active" id="pageForm">

  <div class="insp-card">
    <div class="field">
      <label>שם פקח</label>
      <input id="inspName" type="text" placeholder="שם מלא" autocomplete="off" oninput="saveInsp();upProg()">
    </div>
    <div class="field">
      <label>מספר פקח</label>
      <input id="inspNum" type="text" placeholder="מס׳ עובד" autocomplete="off" oninput="saveInsp();upProg()">
    </div>
  </div>

  <div class="sec-hint">פרטי האירוע</div>

  <div class="card">
    <div class="card-hdr open" onclick="tog('incident')">
      <div class="card-icon-wrap">📋</div>
      <span class="card-title">זמן, סוג ומיקום</span>
      <span class="card-arrow open" id="arr-incident">▼</span>
    </div>
    <div class="card-body" id="bd-incident">
      <div class="field">
        <label><span class="req">* </span>תאריך</label>
        <input id="iDate" type="date" autocomplete="off" oninput="genId();upProg();updateSig()">
      </div>
      <div class="field">
        <label><span class="req">* </span>שעה</label>
        <input id="iTime" type="time" autocomplete="off" oninput="upProg()">
      </div>
      <div class="field span2">
        <label><span class="req">* </span>סוג האירוע</label>
        <select id="iType" onchange="fillSub();upProg()">
          <option value="">— בחר סוג —</option>
          <option>השלכת פסולת בנייה</option>
          <option>השלכת פסולת מעורבת</option>
          <option>שריפת פסולת</option>
          <option>השלכת פסולת חקלאית</option>
          <option>זיהום קרקע</option>
          <option>הטמנת פסולת</option>
          <option>פסולת אסבסט</option>
          <option>זיהום מים</option>
          <option>פסולת מסוכנת</option>
          <option>אחר</option>
        </select>
      </div>
      <div class="field span2">
        <label>כותרת משנה</label>
        <input id="iSub" type="text" placeholder="פירוט נוסף לכותרת הדוח" autocomplete="off">
      </div>
      <div class="field span2">
        <label><span class="req">* </span>מיקום / כתובת</label>
        <input id="iLoc" type="text" placeholder="תיאור מיקום האירוע" autocomplete="off" oninput="upProg()">
      </div>
      <div class="field span2">
        <label>רשות מקומית / שיפוט</label>
        <input id="iJuris" type="text" placeholder="עיר / מועצה אזורית" autocomplete="off">
      </div>
      <div class="field">
        <label>גוש</label>
        <input id="iBlock" type="text" placeholder="מספר גוש" autocomplete="off">
      </div>
      <div class="field">
        <label>חלקה</label>
        <input id="iParcel" type="text" placeholder="מספר חלקה" autocomplete="off">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-hdr" onclick="tog('coords')">
      <div class="card-icon-wrap">📍</div>
      <span class="card-title">מיקום</span>
      <span class="card-arrow" id="arr-coords">▼</span>
    </div>
    <div class="card-body one collapsed" id="bd-coords">
      <div class="field">
        <label>שם המקום</label>
        <input id="placeName" type="text" placeholder='למשל: "ליד צומת עוקבי, שדות נגב"' autocomplete="off">
      </div>
      <div class="field">
        <label>קואורדינטות GPS (WGS84)</label>
        <div class="gps-row">
          <input id="cGPS" type="text" placeholder="31.1234, 34.5678" autocomplete="off" style="direction:ltr;text-align:left">
          <button class="btn-gps" onclick="getGPS()">📡 GPS</button>
        </div>
      </div>
      <div class="field">
        <label>קואורדינטות ITM</label>
        <input id="cITM" type="text" placeholder="ימולא אוטומטית" autocomplete="off" style="direction:ltr;text-align:left" readonly>
      </div>
      <div class="ai-status" id="govmapStatus"></div>
      <div id="gpsMap"></div>
    </div>
  </div>

  <div class="sec-hint">פרטי מבצע העבירה</div>

  <div class="card">
    <div class="card-hdr" onclick="tog('veh')">
      <div class="card-icon-wrap">🚗</div>
      <span class="card-title">רכב ובעלים</span>
      <span class="card-arrow" id="arr-veh">▼</span>
    </div>
    <div class="card-body collapsed" id="bd-veh">
      <div class="field">
        <label>לוחית רישוי</label>
        <input id="vPlate" type="text" placeholder="203-20-304" class="plate-input" autocomplete="off" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="field">
        <label>סוג רכב</label>
        <select id="vType">
          <option value="">— אופציונלי —</option>
          <option>משאית</option>
          <option>טרנזיט</option>
          <option>רכב פרטי</option>
          <option>גרר</option>
          <option>טרקטור</option>
          <option>מכונה</option>
          <option>לא ידוע</option>
        </select>
      </div>
      <div class="field span2">
        <label>בעלים / מבצע</label>
        <input id="vOwner" type="text" placeholder="שם ופרטים אם ידועים" autocomplete="off">
      </div>
      <div class="field">
        <label>מס׳ ח.פ. / ת.ז.</label>
        <input id="vId" type="text" placeholder="מס׳ זיהוי" autocomplete="off">
      </div>
      <div class="field">
        <label>כתובת</label>
        <input id="vAddr" type="text" placeholder="כתובת" autocomplete="off">
      </div>
    </div>
  </div>

  <div class="sec-hint">תיאור האירוע</div>

  <div class="card">
    <div class="card-hdr open" onclick="tog('narr')">
      <div class="card-icon-wrap">📝</div>
      <span class="card-title">מהות האירוע</span>
      <span class="card-arrow open" id="arr-narr">▼</span>
    </div>
    <div class="card-body one" id="bd-narr">
      <div class="field">
        <label>תיאור העבירה — חוק שמירת הניקיון תשמ"ד-1984</label>
        <select id="vViol" onchange="fillViolDesc()">
          <option value="">— בחר סעיף —</option>
          <option value="סעיף 2 — השלכת פסולת ברשות הרבים">סעיף 2 — השלכת פסולת ברשות הרבים</option>
          <option value="סעיף 2 — השלכת פסולת בנייה ברשות הרבים">סעיף 2 — השלכת פסולת בנייה ברשות הרבים</option>
          <option value="סעיף 2 — השלכת גרוטות רכב ברשות הרבים">סעיף 2 — השלכת גרוטות רכב ברשות הרבים</option>
          <option value="סעיף 2 — לכלוך רשות הרבים">סעיף 2 — לכלוך רשות הרבים</option>
          <option value="סעיף 2א — הבערת פסולת שלא כדין">סעיף 2א — הבערת פסולת שלא כדין</option>
          <option value="סעיף 4(א) — אי מניעת השלכת פסולת מרכב">סעיף 4(א) — אי מניעת השלכת פסולת מרכב</option>
          <option value="סעיף 7 — פינוי פסולת בנייה לאתר שאינו מורשה">סעיף 7 — פינוי פסולת בנייה לאתר שאינו מורשה</option>
          <option value="סעיפים 2 ו-4(א) — השלכת פסולת מרכב ברשות הרבים">סעיפים 2 ו-4(א) — השלכת פסולת מרכב ברשות הרבים</option>
          <option value="סעיפים 2 ו-13(ב) — השלכת פסולת ברשות הרבים (רכב מסחרי)">סעיפים 2 ו-13(ב) — השלכת פסולת ברשות הרבים (רכב מסחרי)</option>
          <option value="אחר">אחר (הזן ידנית)</option>
        </select>
      </div>
      <div class="field" id="violManualField" style="display:none">
        <label>פירוט ידני</label>
        <input id="vViolManual" type="text" placeholder="הזן פרטי עבירה ידנית" autocomplete="off">
      </div>
      <div class="field">
        <label>סוג פסולת</label>
        <input id="vWaste" type="text" placeholder="סוג הפסולת שהושלכה" autocomplete="off">
      </div>
      <div class="field">
        <label><span class="req">* </span>מהות האירוע</label>
        <div class="ai-row">
          <textarea id="iDesc" placeholder="תאר את האירוע בפירוט: מה נצפה, מתי, כיצד, מה ננקט..." oninput="upProg()"></textarea>
          <button class="btn-ai" id="btnAI" onclick="runAI()">✦ AI</button>
        </div>
        <div class="ai-status" id="aiStatus"></div>
        <div class="ai-fix-row">
          <input class="ai-fix-input" id="aiFixText" placeholder='למשל: "הוסף שהרכב נסע לכיוון צפון"' autocomplete="off">
          <button class="btn-ai-fix" onclick="runAIFix()">תיקון ✦</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-hdr" onclick="tog('photos')">
      <div class="card-icon-wrap">📷</div>
      <span class="card-title">תמונות</span>
      <span class="card-badge" id="badge-photos"></span>
      <span class="card-arrow" id="arr-photos">▼</span>
    </div>
    <div class="card-body one collapsed" id="bd-photos">
      <button class="btn-add-photo" onclick="$('fileIn').click()">+ הוסף תמונה</button>
      <input type="file" id="fileIn" accept="image/*" multiple onchange="onPhotos(event)">
      <div class="photo-grid" id="photoGrid"></div>
    </div>
  </div>

  <!-- חתימה -->
  <div class="sig-card">
    <div class="sig-title">חתימה ואישור</div>
    <div class="sig-fields">
      <div class="field">
        <label>שם פקח</label>
        <input id="sigName" type="text" readonly style="background:#f0f9f4;color:var(--dust)">
      </div>
      <div class="field">
        <label>מספר עובד</label>
        <input id="sigNum" type="text" readonly style="background:#f0f9f4;color:var(--dust)">
      </div>
      <div class="field span2">
        <label>תאריך הדוח</label>
        <input id="sigDate" type="text" readonly style="background:#f0f9f4;color:var(--dust)">
      </div>
    </div>
    <div class="sig-pad-wrap">
      <label class="field" style="font-size:10px;font-weight:700;color:var(--dust);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">חתימה (צייר כאן)</label>
      <canvas id="sigCanvas" width="400" height="120"></canvas>
      <button class="btn-sig-clear" onclick="clearSig()">נקה חתימה</button>
    </div>
  </div>

  <div style="height:16px"></div>
</div>

<div class="page" id="pageHist">
  <div id="histList"><div class="hist-empty"><span class="big">📋</span>אין דוחות שמורים עדיין</div></div>
</div>

<div class="act-bar" id="actBar">
  <button class="btn-main" onclick="genReport()"><span class="acc">📄</span> הורד קובץ Word</button>
  <button class="btn-save" onclick="saveDraft()">💾 שמור</button>
</div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="js/photos.js"></script>
<script src="js/signature.js"></script>
<script src="js/ui.js"></script>
<script src="js/gps.js"></script>
<script src="js/ai.js"></script>
<script src="js/storage.js"></script>
<script src="js/report.js"></script>
<script src="js/auth.js"></script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
</script>
</body>
</html>
