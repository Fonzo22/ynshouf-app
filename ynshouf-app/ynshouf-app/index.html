<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1f17">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ינשו"פ — דוח אירוע</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.min.js"></script>
<script src="https://unpkg.com/docxtemplater@3.37.12/build/docxtemplater.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --forest:#0d1f17;--pine:#122b1e;--moss:#1a3d2b;--fern:#245c3e;
  --sage:#2e7d52;--leaf:#3da066;--mint:#6abf8a;--mist:#c8e8d5;--fog:#eaf5ee;
  --ember:#e8820a;--flame:#f5a623;--gold:#fdc743;
  --ink:#0d1f17;--dust:#6b8a78;--ghost:#a8c4b4;
  --line:#c2dccb;--line-dk:#2a4a38;--white:#fff;--red:#c0392b;
  --font:'Heebo','Arial Hebrew',Arial,sans-serif;--r:10px;--r-lg:14px
}
body{font-family:var(--font);background:var(--fog);color:var(--ink);min-height:100vh;direction:rtl;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{background:var(--forest);position:sticky;top:0;z-index:300;border-bottom:1px solid var(--line-dk)}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:58px;max-width:640px;margin:0 auto}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-owl-wrap{width:40px;height:40px;border-radius:50%;background:var(--pine);border:2px solid var(--line-dk);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.hdr-owl{width:34px;height:34px;object-fit:contain}
.hdr-name{color:#fff;font-size:16px;font-weight:800;line-height:1}
.hdr-name span{color:var(--flame)}
.hdr-sub{color:var(--ghost);font-size:10px}
.hdr-nav{display:flex;gap:6px}
.nav-btn{background:transparent;color:var(--ghost);border:1px solid var(--line-dk);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s}
.nav-btn:hover{background:var(--moss);color:#fff;border-color:var(--fern)}
.nav-btn.active{background:var(--fern);color:#fff;border-color:var(--sage)}
.nav-btn.danger{color:#e07070;border-color:#5a2020}
.nav-btn.danger:hover{background:#5a2020;color:#fff}
.hdr-prog{background:var(--pine);height:3px}
.hdr-prog-fill{height:100%;background:linear-gradient(90deg,var(--ember),var(--gold));transition:width .4s;width:0}

/* PAGES */
.page{display:none;padding:14px 14px 100px;max-width:640px;margin:0 auto}
.page.active{display:block}

/* INSPECTOR CARD */
.insp-card{background:var(--forest);border-radius:var(--r-lg);padding:14px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:12px;border:1px solid var(--line-dk)}
.insp-card .field label{color:var(--ghost);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.insp-card .field input{background:var(--pine);color:#fff;border:1px solid var(--line-dk);border-radius:7px;padding:9px 12px;font-size:14px;font-family:var(--font);width:100%;transition:border-color .15s,box-shadow .15s}
.insp-card .field input::placeholder{color:rgba(168,196,180,0.4)}
.insp-card .field input:focus{outline:none;border-color:var(--ember);box-shadow:0 0 0 3px rgba(232,130,10,0.15);background:var(--moss)}

/* SECTION CARDS */
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);margin-bottom:12px;overflow:hidden}
.card-hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;background:#f5fbf7;border-bottom:1px solid transparent;transition:background .15s}
.card-hdr:hover{background:#eaf5ee}
.card-hdr.open{border-bottom-color:var(--line)}
.card-icon-wrap{width:32px;height:32px;border-radius:8px;background:var(--mist);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;pointer-events:none}
.card-title{font-size:13px;font-weight:700;color:var(--forest);flex:1;pointer-events:none}
.card-badge{font-size:10px;font-weight:700;color:var(--sage);background:var(--mist);padding:2px 8px;border-radius:10px;display:none;pointer-events:none}
.card-badge.show{display:block}
.card-arrow{color:var(--dust);font-size:10px;transition:transform .25s;pointer-events:none}
.card-arrow.open{transform:rotate(180deg)}
.card-body{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:13px;animation:sd .2s ease}
.card-body.one{grid-template-columns:1fr}
.card-body.collapsed{display:none}
@keyframes sd{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

/* FIELDS */
.field{display:flex;flex-direction:column;gap:5px}
.field.span2{grid-column:1/-1}
.field label{font-size:10px;font-weight:700;color:var(--dust);text-transform:uppercase;letter-spacing:.8px}
.field label .req{color:var(--red)}
.field input,.field select,.field textarea{border:1.5px solid var(--line);border-radius:8px;padding:10px 12px;font-size:14px;font-family:var(--font);color:var(--ink);background:#f8fcfa;direction:rtl;width:100%;transition:border-color .15s,box-shadow .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px rgba(46,125,82,.1);background:#fff}
.field textarea{min-height:120px;resize:vertical;line-height:1.6}
.field input[type=date],.field input[type=time]{direction:ltr;text-align:right}

/* GPS */
.gps-row{display:flex;gap:8px}
.gps-row input{flex:1}
.btn-gps{background:var(--mist);color:var(--forest);border:1.5px solid var(--line);border-radius:8px;padding:10px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:var(--font);transition:all .15s;display:flex;align-items:center;gap:5px;height:42px}
.btn-gps:hover{background:var(--mint);border-color:var(--sage)}

/* PLATE */
.plate-input{direction:ltr!important;text-align:center!important;font-size:18px!important;font-weight:800!important;letter-spacing:3px!important}

/* PHOTOS */
.photos-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.photo-slot{border:2px dashed var(--line);border-radius:var(--r);aspect-ratio:4/3;position:relative;overflow:hidden;cursor:pointer;background:#f5fbf7;transition:border-color .15s}
.photo-slot:hover{border-color:var(--sage)}
.photo-slot.filled{border-style:solid;border-color:var(--leaf)}
.photo-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:6px;color:var(--dust);font-size:11px;font-weight:600}
.photo-ph-icon{font-size:24px;opacity:.7}
.photo-thumb{width:100%;height:100%;object-fit:cover;display:none}
.photo-slot.filled .photo-thumb{display:block}
.photo-slot.filled .photo-ph{display:none}
.photo-del{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center}
.photo-del:hover{background:rgba(192,57,43,.8)}
.photo-slot.filled .photo-del{display:flex}
.photo-cap{position:absolute;bottom:0;right:0;left:0;background:rgba(13,31,23,.7);color:#fff;border:none;border-radius:0 0 8px 8px;padding:6px 10px;font-size:11px;font-family:var(--font);direction:rtl;display:none}
.photo-slot.filled .photo-cap{display:block}
.photo-cap:focus{outline:none;background:rgba(13,31,23,.9)}
.photo-cap::placeholder{color:rgba(255,255,255,.5)}
input[type=file]{display:none}

/* ACTION BAR */
.act-bar{position:fixed;bottom:0;right:0;left:0;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:11px 14px;display:flex;gap:10px;max-width:640px;margin:0 auto;z-index:200}
.btn-main{flex:1;background:var(--forest);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,transform .1s}
.btn-main:hover{background:var(--moss)}
.btn-main:active{transform:scale(.98)}
.btn-main .acc{color:var(--gold)}
.btn-save{background:var(--mist);color:var(--forest);border:1.5px solid var(--line);border-radius:var(--r);padding:14px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:7px;transition:all .15s}
.btn-save:hover{background:var(--mint);border-color:var(--sage)}

/* HISTORY */
.hist-empty{text-align:center;color:var(--dust);padding:60px 20px;font-size:14px}
.hist-empty .big{font-size:40px;display:block;margin-bottom:12px;opacity:.5}
.hist-item{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.hist-item:hover{border-color:var(--sage);box-shadow:0 2px 12px rgba(13,31,23,.07)}
.hist-type{font-size:13px;font-weight:700;color:var(--forest);display:flex;align-items:center;gap:6px}
.hist-type::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--leaf);flex-shrink:0}
.hist-meta{font-size:11px;color:var(--dust);margin-top:4px}
.hist-id{font-size:10px;color:var(--ghost);font-weight:700;margin-top:3px;font-family:monospace}
.hist-del{background:none;border:none;color:var(--ghost);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;transition:color .15s}
.hist-del:hover{color:var(--red)}

/* DIVIDER */
.sec-hint{font-size:10px;font-weight:700;color:var(--ghost);text-transform:uppercase;letter-spacing:1.5px;padding:4px 0 8px;display:flex;align-items:center;gap:8px}
.sec-hint::after{content:"";flex:1;height:1px;background:var(--line)}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--forest);color:#fff;padding:11px 24px;border-radius:24px;font-size:13px;font-weight:600;box-shadow:0 6px 24px rgba(13,31,23,.3);z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;border:1px solid var(--line-dk)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red);border-color:#8a1a0e}
.toast.warn{background:#7a4d00;border-color:#5a3800}

/* AI BUTTON */
.ai-row{display:flex;gap:8px;align-items:flex-start}
.ai-row textarea{flex:1}
.btn-ai{background:var(--forest);color:#fff;border:none;border-radius:8px;padding:10px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap;display:flex;align-items:center;gap:6px;height:42px;transition:background .15s;flex-shrink:0}
.btn-ai:hover{background:var(--moss)}
.btn-ai.loading{background:var(--dust);pointer-events:none}
.ai-fix-row{display:flex;gap:8px;margin-top:8px}
.ai-fix-input{flex:1;border:1.5px solid var(--line);border-radius:8px;padding:9px 12px;font-size:13px;font-family:var(--font);color:var(--ink);background:#f8fcfa;direction:rtl}
.ai-fix-input:focus{outline:none;border-color:var(--ember);background:#fff}
.btn-ai-fix{background:var(--amber,#e8820a);color:#fff;border:none;border-radius:8px;padding:9px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:background .15s}
.btn-ai-fix:hover{opacity:.85}
.ai-status{font-size:11px;color:var(--sage);margin-top:4px;min-height:16px}

/* SIGNATURE CANVAS */
.sig-pad-wrap{margin-top:10px}
#sigCanvas{width:100%;height:120px;border:1.5px solid var(--line);border-radius:8px;background:#fff;cursor:crosshair;touch-action:none;display:block}
.btn-sig-clear{margin-top:6px;background:none;border:1px solid var(--line);border-radius:6px;padding:5px 14px;font-size:11px;color:var(--dust);cursor:pointer;font-family:var(--font)}
.btn-sig-clear:hover{background:var(--fog);color:var(--red)}

/* PHOTOS NEW */
.btn-add-photo{width:100%;background:var(--mist);color:var(--forest);border:1.5px dashed var(--sage);border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);margin-bottom:12px;transition:background .15s}
.btn-add-photo:hover{background:var(--mint)}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pg-item{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:4/3;background:var(--fog)}
.pg-thumb{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer}
.pg-del{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pg-del:hover{background:rgba(192,57,43,.85)}
.pg-cap{position:absolute;bottom:0;right:0;left:0;background:rgba(13,31,23,.65);border:none;color:#fff;font-size:10px;font-family:var(--font);direction:rtl;padding:4px 8px;width:100%}
.pg-cap:focus{outline:none;background:rgba(13,31,23,.9)}
.pg-num{position:absolute;top:4px;right:6px;background:rgba(13,31,23,.6);color:#fff;font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px}

@media(max-width:380px){.card-body{grid-template-columns:1fr}.hdr-sub{display:none}.sig-fields{grid-template-columns:1fr}}
<script src="https://unpkg.com/proj4@2.9.0/dist/proj4.js"></script>
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="hdr-owl-wrap">
        <img class="hdr-owl" id="owlImg" alt="ינשוף" src="icon-512.png">
      </div>
      <div>
        <div class="hdr-name">ינשו<span>"</span>פ</div>
        <div class="hdr-sub">יחידת אכיפת טבע וסביבה</div>
      </div>
    </div>
    <div class="hdr-nav">
      <button class="nav-btn active" id="btnPageForm" onclick="showPage('form')">דוח חדש</button>
      <button class="nav-btn" id="btnPageHist" onclick="showPage('hist')">היסטוריה</button>
      <button class="nav-btn danger" onclick="clearForm()">נקה</button>
    </div>
  </div>
  <div class="hdr-prog"><div class="hdr-prog-fill" id="progFill"></div></div>
</header>

<div class="page active" id="pageForm">

  <div class="insp-card">
    <div class="field">
      <label>שם פקח</label>
      <input id="inspName" type="text" placeholder="שם מלא" oninput="saveInsp();upProg()">
    </div>
    <div class="field">
      <label>מספר פקח</label>
      <input id="inspNum" type="text" placeholder="מס׳ עובד" oninput="saveInsp();upProg()">
    </div>
  </div>

  <div class="sec-hint">פרטי האירוע</div>

  <div class="card">
    <div class="card-hdr open" onclick="tog('incident')">
      <div class="card-icon-wrap">📋</div>
      <span class="card-title">זמן, סוג ומיקום</span>
      <span class="card-arrow open" id="arr-incident">▼</span>
    </div>
    <div class="card-body" id="bd-incident">
      <div class="field">
        <label><span class="req">* </span>תאריך</label>
        <input id="iDate" type="date" oninput="genId();upProg();updateSig()">
      </div>
      <div class="field">
        <label><span class="req">* </span>שעה</label>
        <input id="iTime" type="time" oninput="upProg()">
      </div>
      <div class="field span2">
        <label><span class="req">* </span>סוג האירוע</label>
        <select id="iType" onchange="fillSub();upProg()">
          <option value="">— בחר סוג —</option>
          <option>השלכת פסולת בנייה</option>
          <option>השלכת פסולת מעורבת</option>
          <option>שריפת פסולת</option>
          <option>השלכת פסולת חקלאית</option>
          <option>זיהום קרקע</option>
          <option>הטמנת פסולת</option>
          <option>פסולת אסבסט</option>
          <option>זיהום מים</option>
          <option>פסולת מסוכנת</option>
          <option>אחר</option>
        </select>
      </div>
      <div class="field span2">
        <label>כותרת משנה</label>
        <input id="iSub" type="text" placeholder="פירוט נוסף לכותרת הדוח">
      </div>
      <div class="field span2">
        <label><span class="req">* </span>מיקום / כתובת</label>
        <input id="iLoc" type="text" placeholder="תיאור מיקום האירוע" oninput="upProg()">
      </div>
      <div class="field span2">
        <label>רשות מקומית / שיפוט</label>
        <input id="iJuris" type="text" placeholder="עיר / מועצה אזורית">
      </div>
      <div class="field">
        <label>גוש</label>
        <input id="iBlock" type="text" placeholder="מספר גוש">
      </div>
      <div class="field">
        <label>חלקה</label>
        <input id="iParcel" type="text" placeholder="מספר חלקה">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-hdr" onclick="tog('coords')">
      <div class="card-icon-wrap">📍</div>
      <span class="card-title">מיקום</span>
      <span class="card-arrow" id="arr-coords">▼</span>
    </div>
    <div class="card-body one collapsed" id="bd-coords">
      <div class="field">
        <label>שם המקום</label>
        <input id="placeName" type="text" placeholder='למשל: "ליד צומת עוקבי, שדות נגב"'>
      </div>
      <div class="field">
        <label>קואורדינטות GPS (WGS84)</label>
        <div class="gps-row">
          <input id="cGPS" type="text" placeholder="31.1234, 34.5678" style="direction:ltr;text-align:left">
          <button class="btn-gps" onclick="getGPS()">📡 GPS</button>
        </div>
      </div>
      <div class="field">
        <label>קואורדינטות ITM</label>
        <input id="cITM" type="text" placeholder="ימולא אוטומטית" style="direction:ltr;text-align:left" readonly>
      </div>
      <div class="ai-status" id="govmapStatus"></div>
    </div>
  </div>

  <div class="sec-hint">פרטי מבצע העבירה</div>

  <div class="card">
    <div class="card-hdr" onclick="tog('veh')">
      <div class="card-icon-wrap">🚗</div>
      <span class="card-title">רכב ובעלים</span>
      <span class="card-arrow" id="arr-veh">▼</span>
    </div>
    <div class="card-body collapsed" id="bd-veh">
      <div class="field">
        <label>לוחית רישוי</label>
        <input id="vPlate" type="text" placeholder="203-20-304" class="plate-input" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="field">
        <label>סוג רכב</label>
        <select id="vType">
          <option value="">— אופציונלי —</option>
          <option>משאית</option>
          <option>טרנזיט</option>
          <option>רכב פרטי</option>
          <option>גרר</option>
          <option>טרקטור</option>
          <option>מכונה</option>
          <option>לא ידוע</option>
        </select>
      </div>
      <div class="field span2">
        <label>בעלים / מבצע</label>
        <input id="vOwner" type="text" placeholder="שם ופרטים אם ידועים">
      </div>
      <div class="field">
        <label>מס׳ ח.פ. / ת.ז.</label>
        <input id="vId" type="text" placeholder="מס׳ זיהוי">
      </div>
      <div class="field">
        <label>כתובת</label>
        <input id="vAddr" type="text" placeholder="כתובת">
      </div>
    </div>
  </div>

  <div class="sec-hint">תיאור האירוע</div>

  <div class="card">
    <div class="card-hdr open" onclick="tog('narr')">
      <div class="card-icon-wrap">📝</div>
      <span class="card-title">מהות האירוע</span>
      <span class="card-arrow open" id="arr-narr">▼</span>
    </div>
    <div class="card-body one" id="bd-narr">
      <div class="field">
        <label>תיאור העבירה — חוק שמירת הניקיון תשמ"ד-1984</label>
        <select id="vViol" onchange="fillViolDesc()">
          <option value="">— בחר סעיף —</option>
          <option value="סעיף 2 — השלכת פסולת ברשות הרבים">סעיף 2 — השלכת פסולת ברשות הרבים</option>
          <option value="סעיף 2 — השלכת פסולת בנייה ברשות הרבים">סעיף 2 — השלכת פסולת בנייה ברשות הרבים</option>

      <label class="field" style="font-size:10px;font-weight:700;color:var(--dust);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">חתימה (צייר כאן)</label>

</div>

<div class="act-bar" id="actBar">
  <button class="btn-main" onclick="genReport()"><span class="acc">📄</span> הורד קובץ Word</button>
  <button class="btn-save" onclick="saveDraft()">💾 שמור</button>
</div>

<div class="toast" id="toast"></div>

<script>
var $ = function(id){ return document.getElementById(id); };
var pad = function(n){ return String(n).padStart(2,'0'); };
// ── PHOTOS (dynamic, unlimited) ──
var photos = {};
var photoCounter = 0;

function onPhotos(e) {
  var files = Array.from(e.target.files);
  files.forEach(function(f) {
    var r = new FileReader();
    r.onload = function(ev) {
      photoCounter++;
      var id = photoCounter;
      photos[id] = { src: ev.target.result, cap: '' };
      renderPhotoGrid();
      upProg();
    };
    r.readAsDataURL(f);
  });
  e.target.value = '';
}

function renderPhotoGrid() {
  var grid = $('photoGrid');
  var keys = Object.keys(photos).map(Number).sort(function(a,b){return a-b;});
  grid.innerHTML = keys.map(function(id, i) {
    return '<div class="pg-item" id="pi'+id+'">' +
      '<img class="pg-thumb" src="'+photos[id].src+'" onclick="viewPhoto('+id+')">' +
      '<span class="pg-num">'+(i+1)+'</span>' +
      '<button class="pg-del" onclick="delPg(event,'+id+')">✕</button>' +
      '<input class="pg-cap" placeholder="כיתוב..." value="'+escHtml(photos[id].cap)+'" oninput="photos['+id+'].cap=this.value">' +
      '</div>';
  }).join('');
  var b = $('badge-photos');
  var n = keys.length;
  if (n > 0) { b.textContent = n + ' תמונות'; b.classList.add('show'); }
  else b.classList.remove('show');
}

function escHtml(s) { return (s||'').replace(/"/g,'&quot;'); }

function delPg(e, id) {
  e.stopPropagation();
  delete photos[id];
  renderPhotoGrid();
  upProg();
}

function viewPhoto(id) {
  window.open(photos[id].src, '_blank');
}

// ── SIGNATURE CANVAS ──
var sigCanvas, sigCtx, sigDrawing = false, sigEmpty = true;

function initCanvas() {
  sigCanvas = $('sigCanvas');
  if (!sigCanvas) return;
  sigCtx = sigCanvas.getContext('2d');
  // גודל canvas אמיתי לפי רוחב
  function resize() {
    var w = sigCanvas.offsetWidth;
    sigCanvas.width = w;
    sigCanvas.height = 120;
    sigCtx.strokeStyle = '#0d1f17';
    sigCtx.lineWidth = 2;
    sigCtx.lineCap = 'round';
    sigCtx.lineJoin = 'round';
  }
  resize();

  function getPos(ev) {
    var r = sigCanvas.getBoundingClientRect();
    var src = ev.touches ? ev.touches[0] : ev;
    return { x: (src.clientX - r.left) * (sigCanvas.width / r.width),
             y: (src.clientY - r.top) * (sigCanvas.height / r.height) };
  }
  function start(ev) { ev.preventDefault(); sigDrawing=true; sigEmpty=false; var p=getPos(ev); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); }
  function move(ev)  { ev.preventDefault(); if(!sigDrawing) return; var p=getPos(ev); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); }
  function stop()    { sigDrawing=false; }

  sigCanvas.addEventListener('mousedown', start);
  sigCanvas.addEventListener('mousemove', move);
  sigCanvas.addEventListener('mouseup', stop);
  sigCanvas.addEventListener('mouseleave', stop);
  sigCanvas.addEventListener('touchstart', start, {passive:false});
  sigCanvas.addEventListener('touchmove', move, {passive:false});
  sigCanvas.addEventListener('touchend', stop);
}

function clearSig() {
  if (!sigCtx) return;
  sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);
  sigEmpty = true;
}

var reportId = '';

window.onload = function() {
  // טעינת פרטי פקח
  try {
    var d = JSON.parse(localStorage.getItem('yns_insp') || '{}');
    if (d.n) $('inspName').value = d.n;
    if (d.e) $('inspNum').value = d.e;
  } catch(e) {}
  // תאריך ושעה נוכחיים
  var now = new Date();
  $('iDate').value = now.toISOString().split('T')[0];
  $('iTime').value = pad(now.getHours()) + ':' + pad(now.getMinutes());
  genId();
  upProg();
  updateSig();
  initCanvas();
};

function showPage(p) {
  ['form','hist'].forEach(function(x) {
    $('page' + x[0].toUpperCase() + x.slice(1)).classList.toggle('active', x === p);
    $('btnPage' + x[0].toUpperCase() + x.slice(1)).classList.toggle('active', x === p);
  });
  $('actBar').style.display = p === 'form' ? 'flex' : 'none';
  if (p === 'hist') renderHist();
}

function tog(name) {
  var bd = $('bd-' + name);
  var arr = $('arr-' + name);
  var wasCollapsed = bd.classList.contains('collapsed');
  bd.classList.toggle('collapsed');
  if (arr) arr.classList.toggle('open', wasCollapsed);
}

function upProg() {
  var ids = ['inspName','inspNum','iDate','iTime','iType','iDesc','iLoc'];
  var filled = ids.filter(function(id) {
    var el = $(id);
    return el && el.value && el.value.trim().length > 0;
  }).length;
  $('progFill').style.width = Math.round(filled / ids.length * 100) + '%';
  var n = Object.keys(photos).length;
  var b = $('badge-photos');
  if (n > 0) { b.textContent = n + ' תמונות'; b.classList.add('show'); }
  else b.classList.remove('show');
}

function genId() {
  var d = ($('iDate').value || '').replace(/-/g, '');
  reportId = d ? 'YNS-' + d + '-' + (Math.floor(Math.random() * 900) + 100) : 'YNS-???';
}

function fillViolDesc() {
  var val = $('vViol').value;
  var manual = $('violManualField');
  if (val === 'אחר') {
    manual.style.display = 'flex';
  } else {
    manual.style.display = 'none';
    $('vViolManual').value = '';
  }
}

function getViol() {
  var v = $('vViol').value;
  if (v === 'אחר') return $('vViolManual').value;
  return v;
}

function fillSub() {
  var m = {
    'השלכת פסולת בנייה': 'הטמנת ו/או השלכת פסולת בנייה ועפר חפירה שלא ברשות',
    'שריפת פסולת': 'שריפת פסולת שלא ברשות',
    'פסולת אסבסט': 'השלכת חומרים מכילי אסבסט',
    'זיהום קרקע': 'גרימת זיהום קרקע',
    'פסולת מסוכנת': 'טיפול בפסולת מסוכנת שלא כדין'
  };
  var t = $('iType').value;
  if (m[t] && !$('iSub').value) $('iSub').value = m[t];
}

var WORKER = 'https://ynshouf-proxy.fonzoahrak.workers.dev';

// הגדרת מערכת הקואורדינטות הישראלית ITM
proj4.defs('EPSG:2039', '+proj=tmerc +lat_0=31.7343936111111 +lon_0=35.2045169444444 +k=1.0000067 +x_0=219529.584 +y_0=626907.39 +ellps=GRS80 +towgs84=-48,55,52,0,0,0,0 +units=m +no_defs');

function getGPS() {
  if (!navigator.geolocation) { toast('מכשיר זה אינו תומך ב-GPS', 'err'); return; }
  toast('מאתר מיקום...', 'warn');
  var status = $('govmapStatus');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lat = pos.coords.latitude;
      var lng = pos.coords.longitude;
      $('cGPS').value = lat.toFixed(6) + ', ' + lng.toFixed(6);
      // המרה ל-ITM
      try {
        var itm = proj4('EPSG:4326', 'EPSG:2039', [lng, lat]);
        var x = Math.round(itm[0]);
        var y = Math.round(itm[1]);
        $('cITM').value = x + ', ' + y;
        toast('GPS נטען ✓ — מאתר גוש/חלקה...');
        status.textContent = 'מאתר גוש וחלקה...';
        // Govmap
        fetch(WORKER + '/govmap?x=' + x + '&y=' + y)
          .then(function(r) { return r.json(); })
          .then(function(d) {
            if (d.block) {
              $('iBlock').value = d.block;
              $('iParcel').value = d.parcel || '';
              if (d.jurisdiction) $('iJuris').value = d.jurisdiction;
              status.textContent = 'גוש ' + d.block + ', חלקה ' + (d.parcel || '—') + ' נטענו ✓';
              toast('גוש וחלקה נטענו ✓');
            } else {
              status.textContent = 'לא נמצאו נתוני גוש/חלקה';
            }
          })
          .catch(function() {
            status.textContent = 'Govmap לא זמין — קואורדינטות נטענו';
          });
      } catch(e) {
        $('cITM').value = 'שגיאת המרה';
        toast('GPS נטען ✓');
      }
    },
    function() { toast('שגיאה באיתור מיקום', 'err'); },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ── AI ──
function buildPrompt() {
  return 'אתה פקח אכיפה סביבתית ביחידת ינשו"פ. כתוב מהות אירוע לדוח רשמי בעברית תקנית.\n' +
    'פרטים:\n' +
    'פקח: ' + $('inspName').value + ' | מס׳ ' + $('inspNum').value + '\n' +
    'תאריך: ' + $('iDate').value + ' שעה: ' + $('iTime').value + '\n' +
    'סוג: ' + $('iType').value + '\n' +
    'מיקום: ' + $('iLoc').value + '\n' +
    'לוחית: ' + $('vPlate').value + ' | רכב: ' + $('vType').value + '\n' +
    'בעלים: ' + $('vOwner').value + '\n' +
    'פסולת: ' + $('vWaste').value + '\n' +
    'תיאור גולמי: ' + $('iDesc').value + '\n\n' +
    'כתוב 3-5 משפטים רשמיים בגוף ראשון רבים. ללא כותרות.';
}

async function runAI() {
  var btn = $('btnAI');
  var status = $('aiStatus');
  btn.classList.add('loading');
  btn.textContent = '...';
  status.textContent = 'מייצר תיאור...';
  try {
    var resp = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: buildPrompt() })
    });
    var data = await resp.json();
    var text = data.text || data.content || data.result || '';
    if (text) {
      $('iDesc').value = text;
      status.textContent = '✓ נוצר על ידי AI';
      upProg();
    } else {
      status.textContent = 'לא התקבלה תשובה';
    }
  } catch(e) {
    status.textContent = 'שגיאה: ' + e.message;
    toast('שגיאה בחיבור ל-AI', 'err');
  }
  btn.classList.remove('loading');
  btn.textContent = '✦ AI';
}

async function runAIFix() {
  var fix = $('aiFixText').value.trim();
  var current = $('iDesc').value.trim();
  if (!fix || !current) { toast('מלא תיאור והוראת תיקון', 'warn'); return; }
  var status = $('aiStatus');
  status.textContent = 'מתקן...';
  try {
    var prompt = 'להלן מהות אירוע קיים:\n"' + current + '"\n\nהוראת עדכון: ' + fix + '\n\nכתוב מחדש את המהות עם השינוי המבוקש. אותו סגנון רשמי. ללא כותרות.';
    var resp = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompt })
    });
    var data = await resp.json();
    var text = data.text || data.content || data.result || '';
    if (text) {
      $('iDesc').value = text;
      $('aiFixText').value = '';
      status.textContent = '✓ תוקן';
      upProg();
    }
  } catch(e) {
    status.textContent = 'שגיאה בתיקון';
  }
}

function updateSig() {
  $('sigName').value = $('inspName').value;
  $('sigNum').value = $('inspNum').value;
  $('sigDate').value = $('iDate').value ? new Date($('iDate').value).toLocaleDateString('he-IL') : '';
}

function saveInsp() {
  localStorage.setItem('yns_insp', JSON.stringify({ n: $('inspName').value, e: $('inspNum').value }));
  updateSig();
}

function collect() {
  var ids = ['inspName','inspNum','iDate','iTime','iType','iSub','iLoc','iJuris',
    'iBlock','iParcel','cITM','cGPS','placeName','vPlate','vType','vOwner','vId','vAddr',
    'vViol','vViolManual','vWaste','iDesc'];
  var d = { id: reportId, photos: photos };
  ids.forEach(function(id) {
    var el = $(id);
    if (el) d[id] = el.value || '';
  });
  return d;
}

function getDrafts() {
  try { return JSON.parse(localStorage.getItem('yns_drafts') || '[]'); } catch(e) { return []; }
}

function saveDraft() {
  var data = collect();
  var drafts = getDrafts();
  var i = drafts.findIndex(function(d) { return d.id === reportId; });
  if (i >= 0) drafts[i] = data; else drafts.unshift(data);
  localStorage.setItem('yns_drafts', JSON.stringify(drafts.slice(0, 30)));
  toast('נשמר ✓');
}

function renderHist() {
  var drafts = getDrafts();
  var el = $('histList');
  if (!drafts.length) {
    el.innerHTML = '<div class="hist-empty"><span class="big">📋</span>אין דוחות שמורים עדיין</div>';
    return;
  }
  el.innerHTML = drafts.map(function(d, i) {
    return '<div class="hist-item" onclick="loadDraft(' + i + ')">' +
      '<div>' +
      '<div class="hist-type">' + (d.iType || 'ללא כותרת') + '</div>' +
      '<div class="hist-meta">' + (d.iDate || '') + ' ' + (d.iTime || '') + ' · ' + (d.iLoc || 'ללא מיקום') + '</div>' +
      '<div class="hist-id">' + (d.id || '') + ' · ' + (d.inspName || '') + '</div>' +
      '</div>' +
      '<button class="hist-del" onclick="delDraft(event,' + i + ')">×</button>' +
      '</div>';
  }).join('');
}

function loadDraft(i) {
  var d = getDrafts()[i];
  Object.keys(d).forEach(function(k) { if ($(k)) $(k).value = d[k] || ''; });
  reportId = d.id || reportId;
  showPage('form');
  toast('דוח נטען');
}

function delDraft(e, i) {
  e.stopPropagation();
  if (!confirm('למחוק דוח זה?')) return;
  var drafts = getDrafts();
  drafts.splice(i, 1);
  localStorage.setItem('yns_drafts', JSON.stringify(drafts));
  renderHist();
}

function clearForm() {
  if (!confirm('לנקות את כל השדות?')) return;
  ['iType','iSub','iLoc','iJuris','iBlock','iParcel','cITM','cGPS','placeName',
   'vPlate','vType','vOwner','vId','vAddr','vViol','vWaste','iDesc'].forEach(function(id) {
    if ($(id)) $(id).value = '';
  });
  photos = {};
  photoCounter = 0;
  renderPhotoGrid();
  clearSig();
  var now = new Date();
  $('iDate').value = now.toISOString().split('T')[0];
  $('iTime').value = pad(now.getHours()) + ':' + pad(now.getMinutes());
  genId(); upProg(); updateSig(); toast('הטופס נוקה');
}

function getCap(n) {
  var keys = Object.keys(photos).map(Number).sort(function(a,b){return a-b;});
  var id = keys[n-1];
  return id ? (photos[id].cap || '') : '';
}

function getPhotoLabel(n) {
  var nn = String(n).padStart(2, '0');
  var cap = getCap(n);
  return cap ? 'תמונה מספר ' + nn + ' : ' + cap : 'תמונה מספר ' + nn + ' : ';
}

async function genReport() {
  var errs = [];
  if (!$('inspName').value) errs.push('שם פקח');
  if (!$('inspNum').value) errs.push('מספר פקח');
  if (!$('iDate').value) errs.push('תאריך');
  if (!$('iType').value) errs.push('סוג אירוע');
  if (!$('iDesc').value) errs.push('מהות האירוע');
  if (errs.length) { toast('חסר: ' + errs.join(', '), 'err'); return; }
  toast('טוען תבנית...');
  try {
    var resp = await fetch('YNSHOUF_Template.docx');
    if (!resp.ok) throw new Error('לא ניתן לטעון תבנית (' + resp.status + ')');
    var buf = await resp.arrayBuffer();
    var dateHe = $('iDate').value ? new Date($('iDate').value).toLocaleDateString('he-IL') : '';
    var vars = {
      REPORT_DATE: dateHe,
      REPORT_TITLE_MAIN: $('iType').value,
      REPORT_TITLE_SUB: $('iSub').value,
      INCIDENT_DESCRIPTION: $('iDesc').value,
      REPORT_ID: reportId,
      INSPECTOR_NAME: $('inspName').value,
      EMPLOYEE_NUM: $('inspNum').value,
      REGION: '',
      DATE: dateHe,
      TIME: $('iTime').value,
      COORDS_ITM: $('cITM').value,
      COORDS_GPS: $('cGPS').value,
      PLACE_NAME: $('placeName').value,
      VIOLATION_DESC: getViol(),
      WASTE_TYPE: $('vWaste').value,
      LICENSE_PLATE: $('vPlate').value,
      VEHICLE_TYPE: $('vType').value,
      OWNER_NAME: $('vOwner').value,
      COMPANY_ID: $('vId').value,
      ADDRESS: $('vAddr').value,
      JURISDICTION: $('iJuris').value,
      CADASTRE_BLOCKS: $('iBlock').value,
      CADASTRE_PARCELS: $('iParcel').value,
      PHOTO_1_CAPTION: getPhotoLabel(1),
      PHOTO_2_CAPTION: getPhotoLabel(2),
      PHOTO_3_CAPTION: getPhotoLabel(3),
      PHOTO_4_CAPTION: getPhotoLabel(4),
      PHOTO_5_CAPTION: getPhotoLabel(5),
      PHOTO_6_CAPTION: getPhotoLabel(6),
      PHOTO_7_CAPTION: getPhotoLabel(7),
      PHOTO_8_CAPTION: getPhotoLabel(8),
      PHOTO_9_CAPTION: getPhotoLabel(9),
      PHOTO_10_CAPTION: getPhotoLabel(10)
    };
    var zip = new PizZip(buf);
    var doc = new window.docxtemplater(zip, {
      paragraphLoop: true,
      linebreaks: true,
      delimiters: { start: '{{', end: '}}' }
    });
    doc.render(vars);
    var blob = doc.getZip().generate({
      type: 'blob',
      mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
    });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'דוח_' + reportId + '.docx';
    a.click();
    saveDraft();
    toast('הדוח הורד ✓');
  } catch(err) {
    toast('שגיאה: ' + err.message, 'err');
    console.error(err);
  }
}

function toast(msg, type) {
  var t = $('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function() { t.classList.remove('show'); }, 2700);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
</script>
